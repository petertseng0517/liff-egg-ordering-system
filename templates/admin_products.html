<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 雞蛋配送系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: '微軟正黑體', 'Microsoft JhengHei', sans-serif;
        }
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .nav-link {
            color: #495057;
            border-left: 3px solid transparent;
            padding-left: 15px;
            margin: 5px 0;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #0d6efd;
            border-left-color: #0d6efd;
        }
        .nav-link.active {
            color: #0d6efd;
            border-left-color: #0d6efd;
        }
        .content-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 20px;
        }
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            padding-left: 35px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        .product-table {
            margin-top: 20px;
        }
        .table-responsive {
            border-radius: 8px;
            overflow: hidden;
        }
        .table thead {
            background: #f8f9fa;
            font-weight: 600;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .status-badge:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .status-active {
            background-color: #d4edda;
            color: #155724;
        }
        .status-inactive {
            background-color: #f8d7da;
            color: #721c24;
        }
        .status-discontinued {
            background-color: #e2e3e5;
            color: #383d41;
        }
        .status-low {
            background-color: #fff3cd;
            color: #856404;
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .btn-sm {
            padding: 4px 8px;
            font-size: 0.75rem;
        }
        .alert-info {
            background-color: #e7f3ff;
            border-color: #b3d9ff;
            color: #004085;
        }
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #dee2e6;
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #6c757d;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            color: #0d6efd;
            border-bottom-color: #0d6efd;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .price-input {
            text-align: right;
        }
        .stock-level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .stock-high {
            background: #d4edda;
            color: #155724;
        }
        .stock-medium {
            background: #fff3cd;
            color: #856404;
        }
        .stock-low {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">🥚 土雞蛋管理後台</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/admin">📋 訂單管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/admin/products">📦 商品管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/reports">📊 報表管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/members">👥 會員管理</a>
        </li>
      </ul>
    </div>
    <a href="/logout" class="btn btn-outline-light btn-sm">登出</a>
  </div>
</nav>

<div class="container-fluid" style="padding: 20px;">
    <div class="row">
        <!-- 主要內容區 -->
        <div class="col-md-12">
            <!-- 頁面標題 -->
            <div style="margin-bottom: 30px;">
                <h1 style="color: #333; margin-bottom: 10px;">📦 商品管理</h1>
                <p style="color: #6c757d;">管理商品資訊、庫存與價格</p>
            </div>

            <!-- 標籤頁 -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="products">商品列表</button>
                <button class="tab-btn" data-tab="stock-logs">庫存日誌</button>
                <button class="tab-btn" data-tab="low-stock">低庫存提醒</button>
            </div>

            <!-- Tab 1: 商品列表 -->
            <div id="products" class="tab-content active">
                <div class="content-card">
                    <!-- 操作欄 -->
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <div class="search-box">
                                <input type="text" id="searchInput" class="form-control" placeholder="搜尋商品名稱...">
                            </div>
                        </div>
                        <div class="col-md-6 text-end">
                            <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#productModal" onclick="resetForm()">+ 新增商品</button>
                        </div>
                    </div>

                    <!-- 商品表格 -->
                    <div class="table-responsive product-table">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>商品名稱</th>
                                    <th>單位</th>
                                    <th>售價</th>
                                    <th>成本</th>
                                    <th>實際數量</th>
                                    <th>庫存</th>
                                    <th>狀態</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="productList">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-4">
                                        <div class="spinner-border spinner-border-sm me-2"></div>
                                        加載中...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Tab 2: 庫存日誌 -->
            <div id="stock-logs" class="tab-content">
                <div class="content-card">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-8">
                            <select id="productFilter" class="form-select">
                                <option value="">所有商品</option>
                            </select>
                        </div>
                        <div class="col-md-4 text-end">
                            <button class="btn btn-sm btn-secondary" onclick="loadStockLogs()">重新加載</button>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm table-hover">
                            <thead>
                                <tr>
                                    <th>商品名稱</th>
                                    <th>操作類型</th>
                                    <th>數量</th>
                                    <th>原庫存</th>
                                    <th>新庫存</th>
                                    <th>原因</th>
                                    <th>操作人員</th>
                                    <th>時間</th>
                                </tr>
                            </thead>
                            <tbody id="stockLogList">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-4">
                                        <div class="spinner-border spinner-border-sm me-2"></div>
                                        加載中...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Tab 3: 低庫存提醒 -->
            <div id="low-stock" class="tab-content">
                <div class="content-card">
                    <div class="alert alert-warning mb-4">
                        <strong>⚠️ 低庫存商品</strong>
                        <p style="margin-bottom: 0; margin-top: 5px;">以下商品的庫存已低於設定的警告線</p>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>商品名稱</th>
                                    <th>單位</th>
                                    <th>當前庫存</th>
                                    <th>警告線</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="lowStockList">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <div class="spinner-border spinner-border-sm me-2"></div>
                                        加載中...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 商品編輯模態窗口 -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增商品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">商品名稱 <span style="color: red;">*</span></label>
                                <input type="text" class="form-control" id="productName" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">單位 <span style="color: red;">*</span></label>
                                <input type="text" class="form-control" id="productUnit" placeholder="如：盒、台斤" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">售價 ($) <span style="color: red;">*</span></label>
                                <input type="number" class="form-control price-input" id="productPrice" step="0.01" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">成本 ($)</label>
                                <input type="number" class="form-control price-input" id="productCost" step="0.01" value="0">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">初始庫存 <span style="color: red;">*</span></label>
                                <input type="number" class="form-control" id="productStock" value="0" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">低庫存警告線</label>
                                <input type="number" class="form-control" id="productMinStock" value="10">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">超過庫存上限</label>
                                <input type="number" class="form-control" id="productMaxStock" value="1000">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">實際數量</label>
                                <input type="number" class="form-control" id="productActualQuantity" value="1" min="1">
                                <small class="form-text text-muted">客戶訂購1個時，實際提供的數量</small>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label class="form-label">分類</label>
                                <input type="text" class="form-control" id="productCategory" placeholder="可選">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">商品說明</label>
                        <textarea class="form-control" id="productDescription" rows="2" placeholder="商品詳細描述..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">商品狀態</label>
                        <select class="form-select" id="productStatus">
                            <option value="active">上架</option>
                            <option value="inactive">下架</option>
                            <option value="discontinued">停售</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveProduct()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 庫存調整模態窗口 -->
<div class="modal fade" id="stockModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">調整庫存</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="stockForm">
                    <div class="mb-3">
                        <label class="form-label">商品: <strong id="stockProductName"></strong></label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">當前庫存: <strong id="currentStock"></strong></label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">調整數量 <span style="color: red;">*</span></label>
                        <input type="number" class="form-control" id="stockChange" placeholder="正數增加，負數減少" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">調整原因 <span style="color: red;">*</span></label>
                        <select class="form-select" id="stockReason" required>
                            <option value="">-- 請選擇 --</option>
                            <option value="進貨">進貨</option>
                            <option value="銷售">銷售</option>
                            <option value="盤點調整">盤點調整</option>
                            <option value="損壞報廢">損壞報廢</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="updateStock()">確認調整</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 全局變數
let currentProductId = null;
let allProducts = [];

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    loadProducts();
    setupTabsNavigation();
    setupSearch();
});

// 設置標籤頁導航
function setupTabsNavigation() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const tabName = this.dataset.tab;
            switchTab(tabName);
        });
    });
}

// 切換標籤頁
function switchTab(tabName) {
    // 隱藏所有內容
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
    });
    
    // 移除所有按鈕的 active 狀態
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // 顯示選中的內容
    document.getElementById(tabName).classList.add('active');
    
    // 設置按鈕的 active 狀態
    event.target.classList.add('active');
    
    // 根據標籤頁加載對應的數據
    if (tabName === 'stock-logs') {
        loadStockLogs();
    } else if (tabName === 'low-stock') {
        loadLowStockProducts();
    }
}

// 設置搜尋功能
function setupSearch() {
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
        filterProducts(this.value);
    });
}

// 加載商品列表
function loadProducts() {
    fetch('/api/admin/products')
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                allProducts = data.data || [];
                displayProducts(allProducts);
                updateProductFilter();
            } else {
                showAlert('加載商品失敗: ' + (data.message || '未知錯誤'), 'danger');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showAlert('加載商品失敗', 'danger');
        });
}

// 顯示商品表格
function displayProducts(products) {
    const list = document.getElementById('productList');
    
    if (!products || products.length === 0) {
        list.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暫無商品</td></tr>';
        return;
    }
    
    list.innerHTML = products.map(product => {
        const stockLevel = product.stock > product.minStockAlert 
            ? `<span class="stock-level stock-high">充足 (${product.stock})</span>`
            : `<span class="stock-level stock-low">偏低 (${product.stock})</span>`;
        
        const statusDisplay = {
            'active': { badge: 'status-active', text: '上架' },
            'inactive': { badge: 'status-inactive', text: '下架' },
            'discontinued': { badge: 'status-discontinued', text: '停售' }
        };
        const status = statusDisplay[product.status] || statusDisplay['active'];
        
        return `
            <tr>
                <td><strong>${product.name}</strong></td>
                <td>${product.unit}</td>
                <td>$${product.price.toFixed(2)}</td>
                <td>$${product.cost.toFixed(2)}</td>
                <td><strong>${product.actualQuantity || 1}</strong></td>
                <td>${stockLevel}</td>
                <td><button class="status-badge ${status.badge}" onclick="toggleStatus('${product.productId}', '${product.status}')" title="點擊切換狀態">${status.text}</button></td>
                <td>
                    <div class="action-buttons">
                        <button class="btn btn-sm btn-warning" onclick="editProduct('${product.productId}')">編輯</button>
                        <button class="btn btn-sm btn-info" onclick="openStockModal('${product.productId}')">調庫</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProduct('${product.productId}')">刪除</button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

// 搜尋商品
function filterProducts(keyword) {
    const filtered = allProducts.filter(product => 
        product.name.toLowerCase().includes(keyword.toLowerCase())
    );
    displayProducts(filtered);
}

// 重設表單
function resetForm() {
    currentProductId = null;
    document.getElementById('productForm').reset();
    document.getElementById('modalTitle').textContent = '新增商品';
    document.getElementById('productStock').disabled = false;
}

// 編輯商品
function editProduct(productId) {
    fetch(`/api/admin/product/${productId}`)
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                const product = data.data;
                currentProductId = productId;
                document.getElementById('modalTitle').textContent = '編輯商品';
                document.getElementById('productName').value = product.name;
                document.getElementById('productUnit').value = product.unit;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productCost').value = product.cost;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productStock').disabled = true; // 編輯時禁止改庫存
                document.getElementById('productMinStock').value = product.minStockAlert;
                document.getElementById('productMaxStock').value = product.maxStockAlert || 1000;
                document.getElementById('productActualQuantity').value = product.actualQuantity || 1;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productCategory').value = product.categoryId || '';
                document.getElementById('productStatus').value = product.status || 'active';
                
                new bootstrap.Modal(document.getElementById('productModal')).show();
            }
        });
}

// 保存商品
function saveProduct() {
    const name = document.getElementById('productName').value;
    const unit = document.getElementById('productUnit').value;
    const price = parseFloat(document.getElementById('productPrice').value);
    const cost = parseFloat(document.getElementById('productCost').value);
    const stock = parseInt(document.getElementById('productStock').value);
    const minStockAlert = parseInt(document.getElementById('productMinStock').value);
    const maxStockAlert = parseInt(document.getElementById('productMaxStock').value);
    const actualQuantity = parseInt(document.getElementById('productActualQuantity').value);
    const description = document.getElementById('productDescription').value;
    const categoryId = document.getElementById('productCategory').value;
    const status = document.getElementById('productStatus').value;
    
    if (!name || !unit || !price || price < 0) {
        showAlert('請填寫必要欄位', 'warning');
        return;
    }
    
    const payload = { name, unit, price, cost, stock, minStockAlert, maxStockAlert, actualQuantity, description, categoryId, status };
    
    if (currentProductId) {
        // 編輯
        delete payload.stock; // 編輯時不改庫存
        fetch(`/api/admin/product/${currentProductId}/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                showAlert('商品已更新', 'success');
                bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
                loadProducts();
            } else {
                showAlert(data.message || '更新失敗', 'danger');
            }
        });
    } else {
        // 新增
        fetch('/api/admin/product/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                showAlert('商品已新增', 'success');
                bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
                loadProducts();
            } else {
                showAlert(data.message || '新增失敗', 'danger');
            }
        });
    }
}

// 開啟庫存調整窗口
function openStockModal(productId) {
    const product = allProducts.find(p => p.productId === productId);
    if (product) {
        currentProductId = productId;
        document.getElementById('stockProductName').textContent = product.name;
        document.getElementById('currentStock').textContent = product.stock;
        document.getElementById('stockChange').value = '';
        document.getElementById('stockReason').value = '';
        new bootstrap.Modal(document.getElementById('stockModal')).show();
    }
}

// 更新庫存
function updateStock() {
    const change = parseInt(document.getElementById('stockChange').value);
    const reason = document.getElementById('stockReason').value;
    
    if (!reason || change === 0) {
        showAlert('請填寫所有欄位', 'warning');
        return;
    }
    
    fetch(`/api/admin/product/${currentProductId}/stock`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ qtyChange: change, reason: reason })
    })
    .then(response => response.json())
    .then(data => {
        if (data.code === 0) {
            showAlert('庫存已調整', 'success');
            bootstrap.Modal.getInstance(document.getElementById('stockModal')).hide();
            loadProducts();
            loadStockLogs();
        } else {
            showAlert(data.message || '調整失敗', 'danger');
        }
    });
}

// 刪除商品
function deleteProduct(productId) {
    if (confirm('確定要刪除此商品嗎？')) {
        fetch(`/api/admin/product/${productId}/delete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                showAlert('商品已刪除', 'success');
                loadProducts();
            } else {
                showAlert(data.message || '刪除失敗', 'danger');
            }
        });
    }
}

// 切換商品狀態
function toggleStatus(productId, currentStatus) {
    const statusSequence = {
        'active': 'inactive',
        'inactive': 'discontinued',
        'discontinued': 'active'
    };
    
    const nextStatus = statusSequence[currentStatus] || 'active';
    
    fetch(`/api/admin/product/${productId}/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: nextStatus })
    })
    .then(response => response.json())
    .then(data => {
        if (data.code === 0) {
            showAlert('狀態已更新', 'success');
            loadProducts();
        } else {
            showAlert(data.message || '更新狀態失敗', 'danger');
        }
    });
}

// 加載庫存日誌
function loadStockLogs() {
    const productId = document.getElementById('productFilter').value;
    const url = `/api/admin/stock-logs${productId ? '?productId=' + productId : ''}`;
    
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                displayStockLogs(data.data || []);
            }
        });
}

// 顯示庫存日誌
function displayStockLogs(logs) {
    const list = document.getElementById('stockLogList');
    
    if (!logs || logs.length === 0) {
        list.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暫無日誌</td></tr>';
        return;
    }
    
    list.innerHTML = logs.map(log => {
        const typeDisplay = log.type === 'in' ? '➕ 入庫' : '➖ 出庫';
        const timestamp = formatDate(log.timestamp);
        
        return `
            <tr>
                <td>${log.productName}</td>
                <td>${typeDisplay}</td>
                <td>${log.quantity}</td>
                <td>${log.oldStock}</td>
                <td>${log.newStock}</td>
                <td>${log.reason}</td>
                <td>${log.operator}</td>
                <td style="font-size: 0.85rem;">${timestamp}</td>
            </tr>
        `;
    }).join('');
}

// 加載低庫存商品
function loadLowStockProducts() {
    fetch('/api/admin/low-stock-products')
        .then(response => response.json())
        .then(data => {
            if (data.code === 0) {
                displayLowStockProducts(data.data || []);
            }
        });
}

// 顯示低庫存商品
function displayLowStockProducts(products) {
    const list = document.getElementById('lowStockList');
    
    if (!products || products.length === 0) {
        list.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">✅ 所有商品庫存充足</td></tr>';
        return;
    }
    
    list.innerHTML = products.map(product => `
        <tr>
            <td><strong>${product.name}</strong></td>
            <td>${product.unit}</td>
            <td><span class="stock-level stock-low">${product.stock}</span></td>
            <td>${product.minStockAlert}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="openStockModal('${product.productId}')">補貨</button>
            </td>
        </tr>
    `).join('');
}

// 更新商品篩選選項
function updateProductFilter() {
    const select = document.getElementById('productFilter');
    select.innerHTML = '<option value="">所有商品</option>';
    
    allProducts.forEach(product => {
        const option = document.createElement('option');
        option.value = product.productId;
        option.textContent = product.name;
        select.appendChild(option);
    });
    
    select.addEventListener('change', loadStockLogs);
}

// 格式化日期
function formatDate(dateStr) {
    if (!dateStr) return '-';
    
    try {
        // 如果是時間戳
        if (typeof dateStr === 'number') {
            return new Date(dateStr).toLocaleString('zh-TW', { 
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }
        
        // 如果是 ISO 字符串
        if (typeof dateStr === 'string') {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-TW', { 
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }
    } catch (e) {
        return String(dateStr).substring(0, 19);
    }
}

// 顯示提示
function showAlert(message, type = 'info') {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    
    const container = document.querySelector('.container-fluid');
    container.insertBefore(alertDiv, container.firstChild);
    
    setTimeout(() => alertDiv.remove(), 5000);
}
</script>
